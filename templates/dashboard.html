<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REPORT DASHBOARD // TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

        :root {
            --green: #00ff9c;
            --green-dim: #00b86e;
            --green-soft: rgba(0, 255, 156, 0.08);
            --amber: #ffcc66;
            --red: #ff4d6a;
            --bg: #000000;
            --panel: #020f07;
            --border: #1a4d30;
            --muted: #2a6640;
            --scanline: rgba(0, 255, 156, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--green);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                var(--scanline) 2px,
                var(--scanline) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(0,255,156,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9998;
            animation: flicker 8s infinite;
        }

        @keyframes flicker {
            0%, 97%, 100% { opacity: 1; }
            98% { opacity: 0.85; }
            99% { opacity: 0.95; }
        }

        .vt { font-family: 'VT323', monospace; }

        .panel {
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.92);
            box-shadow: 0 0 28px rgba(0,255,156,0.08), inset 0 0 30px rgba(0,0,0,0.4);
        }

        .title-bar {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        .glow {
            text-shadow: 0 0 8px var(--green), 0 0 20px rgba(0,255,156,0.35);
        }

        .btn {
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
            padding: 10px 14px;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            transition: 0.2s ease;
            box-shadow: 0 0 10px rgba(0,255,156,0.12);
        }

        .btn:hover,
        .btn.active {
            background: rgba(0,255,156,0.1);
            box-shadow: 0 0 18px rgba(0,255,156,0.28);
        }

        .btn-amber {
            border-color: var(--amber);
            color: var(--amber);
            box-shadow: 0 0 10px rgba(255,204,102,0.12);
        }

        .btn-amber:hover {
            background: rgba(255,204,102,0.08);
            box-shadow: 0 0 18px rgba(255,204,102,0.28);
        }

        .btn-red {
            border-color: var(--red);
            color: var(--red);
            box-shadow: 0 0 10px rgba(255,77,106,0.12);
        }

        .btn-red:hover {
            background: rgba(255,77,106,0.08);
            box-shadow: 0 0 18px rgba(255,77,106,0.28);
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            font-size: 1rem;
            line-height: 1;
        }

        .item-card {
            border: 1px solid #10311f;
            background: rgba(0,255,156,0.03);
            transition: 0.2s ease;
        }

        .item-card:hover {
            border-color: var(--green-dim);
            background: rgba(0,255,156,0.07);
        }

        .selected-green {
            border-color: var(--green) !important;
            box-shadow: 0 0 16px rgba(0,255,156,0.18);
        }

        .selected-amber {
            border-color: var(--amber) !important;
            box-shadow: 0 0 16px rgba(255,204,102,0.16);
        }

        .muted { color: var(--muted); }
        .amber { color: var(--amber); }
        .danger { color: var(--red); }

        textarea,
        input,
        select {
            width: 100%;
            background: #000;
            color: var(--green);
            border: 1px solid var(--border);
            padding: 10px 12px;
            outline: none;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
        }

        textarea:focus,
        input:focus,
        select:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 1px var(--green), 0 0 14px rgba(0,255,156,0.15);
        }

        .sidebar-button {
            width: 100%;
            text-align: left;
            border: 1px solid transparent;
            background: transparent;
            color: var(--green);
            padding: 12px 14px;
            transition: 0.2s ease;
        }

        .sidebar-button:hover,
        .sidebar-button.active {
            border-color: var(--border);
            background: rgba(0,255,156,0.06);
            box-shadow: inset 3px 0 0 var(--green);
        }

        .status-box {
            min-height: 46px;
            border: 1px solid #10311f;
            background: rgba(0,255,156,0.03);
        }

        .scroll-panel {
            max-height: 480px;
            overflow-y: auto;
            padding-right: 4px;
        }

        ::-webkit-scrollbar { width: 6px; background: #000; }
        ::-webkit-scrollbar-thumb { background: #1a4d30; }
    </style>
</head>
<body>
    <div class="min-h-screen px-4 py-6 md:px-6">
        <div class="max-w-7xl mx-auto">
            <div class="mb-5 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
                <div>
                    <div class="vt text-4xl glow tracking-[0.3em]">REPORT DASHBOARD</div>
                    <div class="text-xs mt-1 muted tracking-[0.2em]">MONTH -> DATE -> REPORT :: EDIT / DELETE CONSOLE</div>
                </div>
                <div class="flex gap-3">
                    <a href="/" class="btn">[ HOME ]</a>
                </div>
            </div>

            <div class="panel overflow-hidden">
                <div class="title-bar flex items-center justify-between px-4 py-2">
                    <span class="text-xs tracking-[0.2em] muted">REPORT_DASHBOARD.EXE</span>
                    <div class="flex gap-2">
                        <span style="width:8px;height:8px;background:#1a4d30;display:inline-block;"></span>
                        <span style="width:8px;height:8px;background:#1a4d30;display:inline-block;"></span>
                        <span style="width:8px;height:8px;background:var(--green-dim);display:inline-block;"></span>
                    </div>
                </div>

                <div class="grid md:grid-cols-[260px_1fr] min-h-[760px]">
                    <aside class="border-r border-[#10311f] p-4 bg-[rgba(2,15,7,0.78)]">
                        <div class="text-xs tracking-[0.2em] muted mb-3">// SIDEBAR</div>
                        <button id="reportsNav" class="sidebar-button active">[ REPORTS ]</button>

                        <div class="mt-6 text-xs tracking-[0.2em] muted mb-3">// PATH</div>
                        <div class="space-y-2 text-sm">
                            <div>MONTH: <span id="selectedMonthLabel" class="amber">--</span></div>
                            <div>DATE: <span id="selectedDateLabel" class="amber">--</span></div>
                        </div>

                        <div class="mt-6 text-xs tracking-[0.2em] muted mb-3">// STATUS</div>
                        <div id="statusBox" class="status-box p-3 text-sm muted">
                            Loading month index from Google Sheet...
                        </div>
                    </aside>

                    <main class="p-4 md:p-6">
                        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                            <div>
                                <div class="text-xs tracking-[0.2em] muted">// MAIN CONTENT</div>
                                <div id="mainTitle" class="vt text-3xl tracking-[0.15em] mt-1">MONTH ARCHIVE</div>
                            </div>
                            <button id="refreshBtn" class="btn">[ REFRESH ]</button>
                        </div>

                        <div class="mt-5 grid gap-4 lg:grid-cols-[minmax(0,260px)_minmax(0,260px)_1fr]">
                            <section class="panel p-4">
                                <div class="text-xs tracking-[0.2em] muted mb-3">// YEAR / MONTH FILTER</div>
                                <div class="space-y-4">
                                    <div>
                                        <label class="block text-xs muted mb-2">YEAR</label>
                                        <select id="yearSelect"></select>
                                    </div>
                                    <div>
                                        <label class="block text-xs muted mb-2">MONTH</label>
                                        <select id="monthSelect"></select>
                                    </div>
                                    <div id="monthsSummary" class="text-xs muted"></div>
                                </div>
                            </section>

                            <section class="panel p-4">
                                <div class="text-xs tracking-[0.2em] muted mb-3">// DATES</div>
                                <div id="datesList" class="space-y-3 scroll-panel"></div>
                            </section>

                            <section class="panel p-4">
                                <div class="text-xs tracking-[0.2em] muted mb-3">// REPORT VIEW</div>
                                <div id="reportsList" class="space-y-4 scroll-panel"></div>
                            </section>
                        </div>

                        <section class="panel p-4 mt-4">
                            <div class="text-xs tracking-[0.2em] muted mb-3">// EDIT CONSOLE</div>
                            <form id="editForm" class="space-y-4">
                                <input type="hidden" id="editRowNumber" />

                                <div class="grid gap-4 md:grid-cols-2">
                                    <div>
                                        <label class="block text-xs muted mb-2">DATE</label>
                                        <input id="editDate" type="text" placeholder="17 March 2026" />
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs muted mb-2">FROM</label>
                                            <input id="editFromTime" type="text" placeholder="9:00 AM" />
                                        </div>
                                        <div>
                                            <label class="block text-xs muted mb-2">TO</label>
                                            <input id="editToTime" type="text" placeholder="10:00 AM" />
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-xs muted mb-2">TASK</label>
                                    <textarea id="editTask" rows="8" placeholder="Report task details..."></textarea>
                                </div>

                                <div class="flex flex-wrap gap-3">
                                    <button type="submit" class="btn">[ SAVE REPORT ]</button>
                                    <button type="button" id="deleteBtn" class="btn btn-red">[ DELETE REPORT ]</button>
                                    <button type="button" id="clearBtn" class="btn btn-amber">[ CLEAR ]</button>
                                </div>
                            </form>
                        </section>
                    </main>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            years: [],
            monthsByYear: {},
            months: [],
            dates: [],
            reports: [],
            selectedYear: '',
            selectedMonth: '',
            selectedDate: '',
            selectedReport: null,
        };

        function setStatus(message, tone = 'muted') {
            const box = document.getElementById('statusBox');
            box.textContent = message;
            box.classList.remove('muted', 'amber', 'danger');
            box.classList.add(tone);
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function updatePathLabels() {
            const monthLabel = state.selectedYear && state.selectedMonth
                ? `${state.selectedMonth} ${state.selectedYear}`
                : (state.selectedMonth || '--');
            document.getElementById('selectedMonthLabel').textContent = monthLabel;
            document.getElementById('selectedDateLabel').textContent = state.selectedDate || '--';
        }

        function clearForm() {
            state.selectedReport = null;
            document.getElementById('editRowNumber').value = '';
            document.getElementById('editDate').value = state.selectedDate || '';
            document.getElementById('editFromTime').value = '';
            document.getElementById('editToTime').value = '';
            document.getElementById('editTask').value = '';
        }

        function fillForm(report) {
            state.selectedReport = report;
            document.getElementById('editRowNumber').value = report.row_number;
            document.getElementById('editDate').value = report.date;
            document.getElementById('editFromTime').value = report.from_time;
            document.getElementById('editToTime').value = report.to_time;
            document.getElementById('editTask').value = report.task;
        }

        function renderMonthControls() {
            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');
            const summary = document.getElementById('monthsSummary');

            if (!state.years.length) {
                yearSelect.innerHTML = '<option value="">No year found</option>';
                monthSelect.innerHTML = '<option value="">No month found</option>';
                summary.textContent = 'No years or months found in Google Sheet.';
                return;
            }

            yearSelect.innerHTML = [
                '<option value="">Select year</option>',
                ...state.years.map(year => `<option value="${year}" ${String(state.selectedYear) === String(year) ? 'selected' : ''}>${year}</option>`)
            ].join('');

            if (!state.months.length) {
                monthSelect.innerHTML = '<option value="">Select month</option>';
                summary.textContent = state.selectedYear
                    ? `No months found for ${state.selectedYear}.`
                    : 'Select a year to load months.';
                return;
            }

            monthSelect.innerHTML = [
                '<option value="">Select month</option>',
                ...state.months.map(month => `<option value="${month.name}" ${state.selectedMonth === month.name ? 'selected' : ''}>${month.name} :: ${month.date_count} dates :: ${month.report_count} reports</option>`)
            ].join('');
            summary.textContent = state.selectedYear
                ? `${state.months.length} month sheets found for ${state.selectedYear}.`
                : 'Select a year to load months.';
        }

        function renderDates() {
            const container = document.getElementById('datesList');
            if (!state.selectedYear || !state.selectedMonth) {
                container.innerHTML = '<div class="muted text-sm">Select year and month to load dates.</div>';
                return;
            }
            if (!state.dates.length) {
                container.innerHTML = '<div class="muted text-sm">No dates found in this month.</div>';
                return;
            }

            container.innerHTML = state.dates.map(item => `
                <div class="item-card p-3 ${state.selectedDate === item.date ? 'selected-amber' : ''}">
                    <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                        <button type="button" class="min-w-0 text-left flex-1" onclick="selectDate('${item.date}')">
                            <div class="text-sm amber">${item.date}</div>
                            <div class="text-xs muted mt-1">${item.report_count} report entries</div>
                        </button>
                        <button
                            type="button"
                            class="btn btn-red icon-btn shrink-0"
                            onclick="event.stopPropagation(); deleteDateReports('${item.date}')"
                            title="Delete all reports for ${item.date}"
                            aria-label="Delete all reports for ${item.date}"
                        >🗑</button>
                    </div>
                </div>
            `).join('');
        }

        function renderReports() {
            const container = document.getElementById('reportsList');
            if (!state.selectedDate) {
                container.innerHTML = '<div class="muted text-sm">Select a date to view reports.</div>';
                return;
            }
            if (!state.reports.length) {
                container.innerHTML = '<div class="muted text-sm">No reports found for this date.</div>';
                return;
            }

            container.innerHTML = state.reports.map(report => `
                <div class="item-card p-4 ${state.selectedReport && state.selectedReport.row_number === report.row_number ? 'selected-green' : ''}">
                    <div class="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
                        <div class="min-w-0">
                            <div class="amber text-sm">[ ${report.from_time} -> ${report.to_time} ]</div>
                            <div class="mt-3 whitespace-pre-wrap text-sm">${escapeHtml(report.task)}</div>
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <button type="button" class="btn" onclick="editReport(${report.row_number})">[ EDIT ]</button>
                        </div>
                    </div>
                    <div class="text-xs muted mt-3">ROW ${report.row_number} :: ${report.date}</div>
                </div>
            `).join('');
        }

        async function fetchJson(url, options = {}) {
            const response = await fetch(url, options);
            const payload = await response.json();
            if (!response.ok) {
                throw new Error(payload.error || 'Request failed.');
            }
            return payload;
        }

        async function loadMonths() {
            setStatus('Loading month archive...', 'muted');
            const payload = await fetchJson('/dashboard/api/months');
            state.years = payload.years || [];
            state.monthsByYear = payload.months_by_year || {};
            state.months = state.selectedYear ? (state.monthsByYear[String(state.selectedYear)] || []) : [];
            renderMonthControls();
            renderDates();
            renderReports();
            document.getElementById('mainTitle').textContent = 'YEAR / MONTH ARCHIVE';
            setStatus('Month archive loaded from Google Sheet.', 'muted');
        }

        function selectYear(yearValue) {
            state.selectedYear = yearValue;
            state.selectedMonth = '';
            state.selectedDate = '';
            state.selectedReport = null;
            state.dates = [];
            state.reports = [];
            state.months = yearValue ? (state.monthsByYear[String(yearValue)] || []) : [];
            updatePathLabels();
            clearForm();
            renderMonthControls();
            renderDates();
            renderReports();
            document.getElementById('mainTitle').textContent = yearValue
                ? `${yearValue} :: MONTHS`
                : 'YEAR / MONTH ARCHIVE';
            setStatus(yearValue ? `Loaded months for ${yearValue}.` : 'Select a year to continue.', 'muted');
        }

        async function selectMonth(monthName) {
            state.selectedMonth = monthName;
            state.selectedDate = '';
            state.selectedReport = null;
            state.dates = [];
            state.reports = [];
            updatePathLabels();
            clearForm();
            renderMonthControls();
            renderDates();
            renderReports();
            if (!state.selectedYear || !monthName) {
                document.getElementById('mainTitle').textContent = state.selectedYear
                    ? `${state.selectedYear} :: MONTHS`
                    : 'YEAR / MONTH ARCHIVE';
                setStatus('Select a month to continue.', 'muted');
                return;
            }

            document.getElementById('mainTitle').textContent = `${monthName.toUpperCase()} ${state.selectedYear} :: DATES`;
            setStatus(`Loading dates for ${monthName} ${state.selectedYear}...`, 'amber');

            const payload = await fetchJson(`/dashboard/api/dates?year=${encodeURIComponent(state.selectedYear)}&month=${encodeURIComponent(monthName)}`);
            state.dates = payload.dates || [];
            renderDates();
            setStatus(`Loaded ${state.dates.length} dates from ${monthName} ${state.selectedYear}.`, 'muted');
        }

        async function selectDate(dateValue) {
            state.selectedDate = dateValue;
            state.selectedReport = null;
            updatePathLabels();
            clearForm();
            renderDates();
            document.getElementById('editDate').value = dateValue;
            document.getElementById('mainTitle').textContent = `${state.selectedMonth.toUpperCase()} ${state.selectedYear} :: ${dateValue.toUpperCase()}`;
            setStatus(`Loading reports for ${dateValue}...`, 'amber');

            const payload = await fetchJson(`/dashboard/api/reports?year=${encodeURIComponent(state.selectedYear)}&month=${encodeURIComponent(state.selectedMonth)}&date=${encodeURIComponent(dateValue)}`);
            state.reports = payload.reports || [];
            renderReports();
            setStatus(`Loaded ${state.reports.length} reports for ${dateValue}.`, 'muted');
        }

        function editReport(rowNumber) {
            const report = state.reports.find(item => item.row_number === rowNumber);
            if (!report) return;
            fillForm(report);
            renderReports();
            setStatus(`Editing row ${rowNumber}.`, 'amber');
            document.getElementById('editTask').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        async function saveReport(event) {
            event.preventDefault();

            const rowNumber = Number(document.getElementById('editRowNumber').value);
            if (!state.selectedMonth || !rowNumber) {
                setStatus('Select a report first, then save.', 'danger');
                return;
            }

            const payload = {
                month: state.selectedMonth,
                row_number: rowNumber,
                date: document.getElementById('editDate').value.trim(),
                from_time: document.getElementById('editFromTime').value.trim(),
                to_time: document.getElementById('editToTime').value.trim(),
                task: document.getElementById('editTask').value.trim(),
            };

            setStatus(`Saving row ${rowNumber}...`, 'amber');
            await fetchJson('/dashboard/api/report/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });

            const currentDate = payload.date;
            await selectMonth(state.selectedMonth);
            await selectDate(currentDate);
            const updated = state.reports.find(item => item.row_number === rowNumber);
            if (updated) fillForm(updated);
            setStatus(`Row ${rowNumber} updated successfully.`, 'muted');
        }

        async function deleteReport() {
            const rowNumber = Number(document.getElementById('editRowNumber').value);
            if (!state.selectedMonth || !rowNumber) {
                setStatus('Select a report first, then delete.', 'danger');
                return;
            }

            const confirmed = window.confirm(`Delete report row ${rowNumber}?`);
            if (!confirmed) return;

            const currentDate = document.getElementById('editDate').value.trim() || state.selectedDate;
            setStatus(`Deleting row ${rowNumber}...`, 'danger');
            await fetchJson('/dashboard/api/report/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    month: state.selectedMonth,
                    row_number: rowNumber,
                }),
            });

            clearForm();
            await selectMonth(state.selectedMonth);
            if (currentDate) {
                const stillExists = state.dates.some(item => item.date === currentDate);
                if (stillExists) {
                    await selectDate(currentDate);
                } else {
                    state.reports = [];
                    state.selectedDate = '';
                    updatePathLabels();
                    renderReports();
                    renderDates();
                }
            }
            setStatus(`Row ${rowNumber} deleted successfully.`, 'muted');
        }

        async function deleteDateReports(dateValue) {
            if (!state.selectedYear || !state.selectedMonth || !dateValue) {
                setStatus('Select year and month first.', 'danger');
                return;
            }

            const confirmed = window.confirm(`Delete all reports for ${dateValue}?`);
            if (!confirmed) return;

            setStatus(`Deleting all reports for ${dateValue}...`, 'danger');
            await fetchJson('/dashboard/api/date/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    year: state.selectedYear,
                    month: state.selectedMonth,
                    date: dateValue,
                }),
            });

            if (state.selectedDate === dateValue) {
                clearForm();
                state.selectedDate = '';
                state.selectedReport = null;
                state.reports = [];
                updatePathLabels();
                renderReports();
            }

            await selectMonth(state.selectedMonth);
            setStatus(`All reports deleted for ${dateValue}.`, 'muted');
        }

        document.getElementById('refreshBtn').addEventListener('click', async () => {
            state.selectedYear = '';
            state.selectedMonth = '';
            state.selectedDate = '';
            state.selectedReport = null;
            state.months = [];
            state.dates = [];
            state.reports = [];
            updatePathLabels();
            clearForm();
            await loadMonths();
        });

        document.getElementById('yearSelect').addEventListener('change', (event) => {
            selectYear(event.target.value);
        });

        document.getElementById('monthSelect').addEventListener('change', (event) => {
            selectMonth(event.target.value).catch(error => {
                setStatus(error.message || 'Failed to load month.', 'danger');
            });
        });

        document.getElementById('editForm').addEventListener('submit', saveReport);
        document.getElementById('deleteBtn').addEventListener('click', deleteReport);
        document.getElementById('clearBtn').addEventListener('click', () => {
            clearForm();
            setStatus('Edit console cleared.', 'muted');
            renderReports();
        });

        loadMonths().catch(error => {
            setStatus(error.message || 'Failed to load dashboard.', 'danger');
        });
    </script>
</body>
</html>
