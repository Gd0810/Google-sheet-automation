
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>USERS DASHBOARD // TERMINAL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind-report.css') }}">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

        :root {
            --green: #00ff9c;
            --green-dim: #00b86e;
            --amber: #ffcc66;
            --red: #ff4d6a;
            --bg: #000000;
            --panel: #020f07;
            --border: #1a4d30;
            --muted: #2a6640;
            --scanline: rgba(0, 255, 156, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--green);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                var(--scanline) 2px,
                var(--scanline) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(0,255,156,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9998;
        }

        .vt { font-family: 'VT323', monospace; }

        .panel {
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.92);
            box-shadow: 0 0 28px rgba(0,255,156,0.08), inset 0 0 30px rgba(0,0,0,0.4);
        }

        .title-bar {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        .glow {
            text-shadow: 0 0 8px var(--green), 0 0 20px rgba(0,255,156,0.35);
        }

        .btn {
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
            padding: 10px 14px;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            transition: 0.2s ease;
            box-shadow: 0 0 10px rgba(0,255,156,0.12);
        }

        .btn:hover {
            background: rgba(0,255,156,0.1);
            box-shadow: 0 0 18px rgba(0,255,156,0.28);
        }

        .sidebar-button {
            width: 100%;
            display: block;
            text-align: left;
            border: 1px solid transparent;
            background: transparent;
            color: var(--green);
            padding: 12px 14px;
            transition: 0.2s ease;
        }

        .sidebar-stack {
            display: flex;
            flex-direction: column;
            gap: 0;
            border: 1px solid #10311f;
            background: rgba(0,255,156,0.02);
        }

        .sidebar-stack .sidebar-button + .sidebar-button {
            border-top: 1px solid #10311f;
        }

        .sidebar-button:hover,
        .sidebar-button.active {
            border-color: var(--border);
            background: rgba(0,255,156,0.06);
            box-shadow: inset 3px 0 0 var(--green);
        }

        .item-card {
            border: 1px solid #10311f;
            background: rgba(0,255,156,0.03);
            transition: 0.2s ease;
        }

        .item-card:hover,
        .item-card.active {
            border-color: var(--green);
            box-shadow: 0 0 16px rgba(0,255,156,0.18);
            background: rgba(0,255,156,0.07);
        }

        .muted { color: var(--muted); }
        .amber { color: var(--amber); }
        .danger { color: var(--red); }

        .status-box {
            min-height: 46px;
            border: 1px solid #10311f;
            background: rgba(0,255,156,0.03);
        }

        .scroll-panel {
            max-height: 560px;
            overflow-y: auto;
            padding-right: 4px;
        }

        ::-webkit-scrollbar { width: 6px; background: #000; }
        ::-webkit-scrollbar-thumb { background: #1a4d30; }
    </style>
</head>
<body>
    <div class="min-h-screen px-4 py-6 md:px-6">
        <div class="max-w-7xl mx-auto">
            <div class="mb-5 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
                <div>
                    <div class="vt text-4xl glow tracking-[0.3em]">USERS DASHBOARD</div>
                    <div class="text-xs mt-1 muted tracking-[0.2em]">SHARING USERS :: OWNER :: LAST OPEN VIA APP</div>
                </div>
                <div class="flex gap-3">
                    <a href="/" class="btn">[ HOME ]</a>
                </div>
            </div>

            <div class="panel overflow-hidden">
                <div class="title-bar flex items-center justify-between px-4 py-2">
                    <span class="text-xs tracking-[0.2em] muted">USERS_DASHBOARD.EXE</span>
                    <div class="flex gap-2">
                        <span style="width:8px;height:8px;background:#1a4d30;display:inline-block;"></span>
                        <span style="width:8px;height:8px;background:#1a4d30;display:inline-block;"></span>
                        <span style="width:8px;height:8px;background:var(--green-dim);display:inline-block;"></span>
                    </div>
                </div>

                <div class="grid md:grid-cols-[260px_1fr] min-h-[760px]">
                    <aside class="border-r border-[#10311f] p-4 bg-[rgba(2,15,7,0.78)]">
                        <div class="text-xs tracking-[0.2em] muted mb-3">// SIDEBAR</div>
                        <div class="sidebar-stack">
                            <a href="/dashboard" class="sidebar-button">[ REPORTS ]</a>
                            <a href="/users" class="sidebar-button active">[ USERS ]</a>
                        </div>

                        <div class="mt-6 text-xs tracking-[0.2em] muted mb-3">// STATUS</div>
                        <div id="statusBox" class="status-box p-3 text-sm muted">
                            Loading sharing users from Google Sheet...
                        </div>
                    </aside>

                    <main class="p-4 md:p-6">
                        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                            <div>
                                <div class="text-xs tracking-[0.2em] muted">// USERS VIEW</div>
                                <div id="mainTitle" class="vt text-3xl tracking-[0.15em] mt-1">SHARING USERS</div>
                            </div>
                            <button id="refreshBtn" class="btn">[ REFRESH ]</button>
                        </div>

                        <div class="mt-5 grid gap-4 lg:grid-cols-[minmax(0,340px)_1fr]">
                            <section class="panel p-4">
                                <div class="text-xs tracking-[0.2em] muted mb-3">// MAIL IDS</div>
                                <div id="usersList" class="space-y-3 scroll-panel"></div>
                            </section>

                            <section class="panel p-4">
                                <div class="text-xs tracking-[0.2em] muted mb-3">// USER DETAILS</div>
                                <div id="detailView" class="space-y-4 scroll-panel">
                                    <div class="muted text-sm">Select a mail id to view owner and Google Sheet update details.</div>
                                </div>
                            </section>
                        </div>
                    </main>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            users: [],
            selectedEmail: '',
        };

        function setStatus(message, tone = 'muted') {
            const box = document.getElementById('statusBox');
            box.textContent = message;
            box.classList.remove('muted', 'amber', 'danger');
            box.classList.add(tone);
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function fetchJson(url) {
            const response = await fetch(url);
            const payload = await response.json();
            if (!response.ok) {
                throw new Error(payload.error || 'Request failed.');
            }
            return payload;
        }

        function renderUsers() {
            const container = document.getElementById('usersList');
            if (!state.users.length) {
                container.innerHTML = '<div class="muted text-sm">No shared users found.</div>';
                return;
            }

            container.innerHTML = state.users.map(user => `
                <button type="button" class="item-card w-full text-left p-3 ${state.selectedEmail === user.email ? 'active' : ''}"
                    onclick="selectUser('${user.email}')">
                    <div class="text-sm amber">${escapeHtml(user.email)}</div>
                    <div class="text-xs muted mt-1">${escapeHtml(user.role)} :: ${escapeHtml(user.type)}${user.is_owner ? ' :: owner' : ''}</div>
                </button>
            `).join('');
        }

        function renderDetail(payload) {
            const user = payload.user;
            const sheet = payload.sheet;
            const detailView = document.getElementById('detailView');
            detailView.innerHTML = `
                <div class="item-card p-4">
                    <div class="text-xs muted mb-2">SELECTED USER</div>
                    <div class="amber text-sm">${escapeHtml(user.email)}</div>
                    <div class="text-sm mt-2">${escapeHtml(user.display_name)}</div>
                    <div class="text-xs muted mt-2">ROLE: ${escapeHtml(user.role)} :: TYPE: ${escapeHtml(user.type)}</div>
                </div>

                <div class="item-card p-4">
                    <div class="text-xs muted mb-2">OWNER MAIL IDS</div>
                    <div class="space-y-2">
                        ${sheet.owners.map(owner => `<div class="text-sm amber">${escapeHtml(owner.emailAddress || owner.displayName || 'Unknown')}</div>`).join('')}
                    </div>
                </div>

                <div class="item-card p-4">
                    <div class="text-xs muted mb-2">GOOGLE SHEET DETAILS</div>
                    <div class="space-y-2 text-sm">
                        <div>NAME: <span class="amber">${escapeHtml(sheet.name)}</span></div>
                        <div>LAST UPDATE: <span class="amber">${escapeHtml(sheet.modified_time)}</span></div>
                        <div>LAST UPDATED BY: <span class="amber">${escapeHtml(sheet.last_modifying_user.emailAddress || sheet.last_modifying_user.displayName || 'Unknown')}</span></div>
                        <div>WORKSHEETS: <span class="amber">${sheet.worksheet_count}</span></div>
                        <div class="muted">TABS: ${escapeHtml(sheet.worksheet_titles.join(', '))}</div>
                    </div>
                </div>

                <div class="item-card p-4">
                    <div class="text-xs muted mb-2">LAST OPEN FOR THIS USER</div>
                    <div class="text-sm amber">${escapeHtml(payload.tracking.last_open_via_app?.opened_at || 'No tracked open yet')}</div>
                    <div class="text-xs muted mt-2">${escapeHtml(payload.notes.last_view)}</div>
                </div>

                <div class="item-card p-4">
                    <div class="text-xs muted mb-2">OPEN SHEET</div>
                    <a class="btn inline-block" href="/users/open?email=${encodeURIComponent(user.email)}" target="_blank" rel="noreferrer">[ OPEN GOOGLE SHEET ]</a>
                </div>
            `;
        }

        async function loadUsers() {
            setStatus('Loading sharing users...', 'muted');
            const payload = await fetchJson('/users/api/list');
            state.users = payload.users || [];
            renderUsers();
            setStatus('Sharing users loaded from Google Sheet.', 'muted');
        }

        async function selectUser(email) {
            state.selectedEmail = email;
            renderUsers();
            document.getElementById('mainTitle').textContent = email.toUpperCase();
            setStatus(`Loading details for ${email}...`, 'amber');
            const payload = await fetchJson(`/users/api/detail?email=${encodeURIComponent(email)}`);
            renderDetail(payload);
            setStatus(`Loaded user and sheet details for ${email}.`, 'muted');
        }

        document.getElementById('refreshBtn').addEventListener('click', async () => {
            state.selectedEmail = '';
            document.getElementById('mainTitle').textContent = 'SHARING USERS';
            document.getElementById('detailView').innerHTML = '<div class="muted text-sm">Select a mail id to view owner and Google Sheet update details.</div>';
            await loadUsers();
        });

        loadUsers().catch(error => {
            setStatus(error.message || 'Failed to load users dashboard.', 'danger');
        });
    </script>
</body>
</html>
